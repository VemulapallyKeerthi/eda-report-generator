<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EDA Report Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Light mode (default) ── */
    :root {
      --bg-page:       #f0f4f8;
      --bg-card:       #ffffff;
      --bg-feature:    #f7fafc;
      --bg-upload-hover: #ebf8ff;
      --text-primary:  #1a202c;
      --text-secondary:#718096;
      --text-feature:  #4a5568;
      --border:        #cbd5e0;
      --accent:        #2980b9;
      --accent-hover:  #2471a3;
      --btn-disabled:  #a0aec0;
      --status-load-bg:#ebf8ff;
      --status-load-fg:#2980b9;
      --status-ok-bg:  #f0fff4;
      --status-ok-fg:  #276749;
      --status-err-bg: #fff5f5;
      --status-err-fg: #c53030;
      --shadow:        rgba(0,0,0,0.08);
      --toggle-bg:     #e2e8f0;
    }

    /* ── Dark mode ── */
    body.dark {
      --bg-page:       #0f1117;
      --bg-card:       #1a1d27;
      --bg-feature:    #22263a;
      --bg-upload-hover:#1e3a5f;
      --text-primary:  #f0f4f8;
      --text-secondary:#a0aec0;
      --text-feature:  #cbd5e0;
      --border:        #2d3748;
      --accent:        #4299e1;
      --accent-hover:  #3182ce;
      --btn-disabled:  #4a5568;
      --status-load-bg:#1e3a5f;
      --status-load-fg:#90cdf4;
      --status-ok-bg:  #1a3a2a;
      --status-ok-fg:  #68d391;
      --status-err-bg: #3b1a1a;
      --status-err-fg: #fc8181;
      --shadow:        rgba(0,0,0,0.4);
      --toggle-bg:     #2d3748;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg-page);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }

    .container {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 48px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 8px 32px var(--shadow);
      text-align: center;
      position: relative;
      transition: background 0.3s, box-shadow 0.3s;
    }

    /* ── Dark mode toggle ── */
    .theme-toggle {
      position: absolute;
      top: 16px;
      right: 16px;
      background: var(--toggle-bg);
      border: none;
      border-radius: 20px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 18px;
      transition: background 0.3s;
      width: auto;
    }
    .theme-toggle:hover { opacity: 0.8; }

    h1 { color: var(--text-primary); font-size: 28px; margin-bottom: 8px; transition: color 0.3s; }
    p.subtitle { color: var(--text-secondary); font-size: 15px; margin-bottom: 36px; transition: color 0.3s; }

    .upload-area {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 40px 24px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 24px;
    }
    .upload-area:hover, .upload-area.dragover {
      border-color: var(--accent);
      background: var(--bg-upload-hover);
    }
    .upload-icon { font-size: 48px; margin-bottom: 12px; }
    .upload-area p { color: var(--text-secondary); font-size: 14px; transition: color 0.3s; }
    .upload-area strong { color: var(--accent); }
    #fileInput { display: none; }
    #fileName {
      margin-top: 10px;
      font-size: 13px;
      color: var(--accent);
      font-weight: 600;
    }

    button {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover:not(:disabled) { background: var(--accent-hover); }
    button:disabled { background: var(--btn-disabled); cursor: not-allowed; }

    .status {
      margin-top: 20px;
      padding: 14px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }
    .status.loading {
      background: var(--status-load-bg);
      color: var(--status-load-fg);
      display: block;
    }
    .status.success {
      background: var(--status-ok-bg);
      color: var(--status-ok-fg);
      display: block;
    }
    .status.error {
      background: var(--status-err-bg);
      color: var(--status-err-fg);
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--accent);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .features {
      display: flex;
      justify-content: space-between;
      margin-top: 32px;
      gap: 12px;
    }
    .feature {
      flex: 1;
      background: var(--bg-feature);
      border-radius: 10px;
      padding: 16px 10px;
      font-size: 12px;
      color: var(--text-feature);
      transition: background 0.3s, color 0.3s;
    }
    .feature span { font-size: 22px; display: block; margin-bottom: 6px; }
  </style>
</head>
<body>
  <div class="container">

    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>

    <h1>📊 EDA Report Generator</h1>
    <p class="subtitle">Upload any CSV file and get a full analysis report with AI insights</p>

    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
      <div class="upload-icon">📁</div>
      <p><strong>Click to upload</strong> or drag and drop</p>
      <p>CSV files only</p>
      <div id="fileName"></div>
    </div>
    <input type="file" id="fileInput" accept=".csv" />

    <button id="generateBtn" onclick="generateReport()" disabled>
      Generate Report
    </button>

    <div class="status" id="status"></div>

    <div class="features">
      <div class="feature"><span>📈</span>Distributions</div>
      <div class="feature"><span>🔍</span>Outlier Detection</div>
      <div class="feature"><span>🔗</span>Correlations</div>
      <div class="feature"><span>🤖</span>AI Summary</div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const uploadArea = document.getElementById('uploadArea');
    const generateBtn = document.getElementById('generateBtn');
    const fileNameDiv = document.getElementById('fileName');
    const status = document.getElementById('status');
    const themeToggle = document.getElementById('themeToggle');

    let selectedFile = null;

    // ── Theme toggle ──
    function toggleTheme() {
      const isDark = document.body.classList.toggle('dark');
      themeToggle.textContent = isDark ? '☀️' : '🌙';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    // Restore saved theme on load
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark');
      themeToggle.textContent = '☀️';
    }

    // ── File handling ──
    fileInput.addEventListener('change', (e) => {
      selectedFile = e.target.files[0];
      if (selectedFile) {
        fileNameDiv.textContent = '✓ ' + selectedFile.name;
        generateBtn.disabled = false;
      }
    });

    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.name.endsWith('.csv')) {
        selectedFile = file;
        fileNameDiv.textContent = '✓ ' + file.name;
        generateBtn.disabled = false;
      } else {
        showStatus('error', 'Please drop a CSV file.');
      }
    });

    // ── Report generation ──
    async function generateReport() {
      if (!selectedFile) return;

      generateBtn.disabled = true;
      showStatus('loading', '<span class="spinner"></span> Generating your report... this may take 20-30 seconds');

      const formData = new FormData();
      formData.append('file', selectedFile);

      try {
        const response = await fetch('/upload', {
          method: 'POST',
          body: formData
        });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.detail || 'Something went wrong');
        }

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'eda_report.html';
        a.click();

        showStatus('success', '✅ Report generated and downloaded successfully!');
      } catch (err) {
        showStatus('error', '❌ Error: ' + err.message);
      } finally {
        generateBtn.disabled = false;
      }
    }

    function showStatus(type, message) {
      status.className = 'status ' + type;
      status.innerHTML = message;
    }
  </script>
</body>
</html>
